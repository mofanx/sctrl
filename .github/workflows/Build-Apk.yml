name: Build-Apk

on:
  workflow_dispatch:

  push:
    branches:
      - '**'
    paths-ignore:
      - 'LICENSE'
      - '*.md'
      - '.github/**'

jobs:
  build:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore:') && !startsWith(github.event.head_commit.message, 'chore(') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: write sctrl secrets info
        run: |
          echo ${{ secrets.SCTRL_STORE_FILE_BASE64 }} | base64 --decode > ${{ github.workspace }}/sctrl.jks
          echo SCTRL_STORE_FILE='${{ github.workspace }}/sctrl.jks' >> gradle.properties
          echo SCTRL_STORE_PASSWORD='${{ secrets.SCTRL_STORE_PASSWORD }}' >> gradle.properties
          echo SCTRL_KEY_ALIAS='${{ secrets.SCTRL_KEY_ALIAS }}' >> gradle.properties
          echo SCTRL_KEY_PASSWORD='${{ secrets.SCTRL_KEY_PASSWORD }}' >> gradle.properties

      - run: echo SCTRL_RENAME_APK_FLAG=1 >> gradle.properties

      - run: chmod 777 ./gradlew
      - run: ./gradlew app:assembleSctrlRelease

      - uses: actions/upload-artifact@v7
        with:
          archive: false
          path: app/build/outputs/apk/sctrl/release/*.apk

      - uses: actions/upload-artifact@v7
        with:
          name: outputs
          path: app/build/outputs
